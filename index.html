<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snake Game | Lucio</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
font-family:Poppins, sans-serif;
color:white;
}

/* TITRE */

h1{
font-size:35px;
background:linear-gradient(90deg,orange,red);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SCORE */

.score-box{
display:flex;
gap:30px;
margin:10px;
font-size:18px;
}

canvas{
background:#111;
border-radius:15px;
box-shadow:0 0 25px rgba(255,140,0,0.5);
}

/* CONTROLES */

.controls{
margin-top:20px;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

.controls div{
display:flex;
gap:10px;
}

.controls button{
padding:14px;
font-size:20px;
border:none;
border-radius:12px;
background:rgba(255,140,0,0.2);
color:orange;
backdrop-filter:blur(10px);
cursor:pointer;
}

.controls button:active{
transform:scale(0.9);
}

/* BOUTON */

.restart{
margin-top:15px;
padding:10px 25px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,orange,red);
color:black;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Snake Game</h1>

<div class="score-box">
<div>Score : <span id="score">0</span></div>
<div>Best : <span id="best">0</span></div>
</div>

<canvas id="game" width="400" height="400"></canvas>

<div class="controls">
<button onclick="setDirection('UP')">⬆️</button>
<div>
<button onclick="setDirection('LEFT')">⬅️</button>
<button onclick="setDirection('DOWN')">⬇️</button>
<button onclick="setDirection('RIGHT')">➡️</button>
</div>
</div>

<button class="restart" onclick="restartGame()">Recommencer</button>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

const box = 20

let snake = [{x:200,y:200}]
let direction = "RIGHT"

let food = randomFood()

let score = 0
let best = localStorage.getItem("bestScore") || 0
document.getElementById("best").innerText = best

document.addEventListener("keydown",changeDirection)

function randomFood(){
return {
x: Math.floor(Math.random()*20)*box,
y: Math.floor(Math.random()*20)*box
}
}

// clavier

function changeDirection(e){
if(e.key==="ArrowUp" && direction!=="DOWN") direction="UP"
if(e.key==="ArrowDown" && direction!=="UP") direction="DOWN"
if(e.key==="ArrowLeft" && direction!=="RIGHT") direction="LEFT"
if(e.key==="ArrowRight" && direction!=="LEFT") direction="RIGHT"
}

// mobile

function setDirection(dir){
if(dir==="UP" && direction!=="DOWN") direction="UP"
if(dir==="DOWN" && direction!=="UP") direction="DOWN"
if(dir==="LEFT" && direction!=="RIGHT") direction="LEFT"
if(dir==="RIGHT" && direction!=="LEFT") direction="RIGHT"
}

// dessin

function draw(){

// fond
ctx.fillStyle="#111"
ctx.fillRect(0,0,400,400)

// serpent
for(let i=0;i<snake.length;i++){

ctx.fillStyle = i==0 ? "orange" : "#ffb347"

ctx.shadowColor="orange"
ctx.shadowBlur=10

ctx.fillRect(snake[i].x,snake[i].y,box,box)

ctx.shadowBlur=0
}

// nourriture
ctx.fillStyle="red"
ctx.beginPath()
ctx.arc(food.x+10,food.y+10,8,0,Math.PI*2)
ctx.fill()

let snakeX = snake[0].x
let snakeY = snake[0].y

if(direction==="LEFT") snakeX-=box
if(direction==="UP") snakeY-=box
if(direction==="RIGHT") snakeX+=box
if(direction==="DOWN") snakeY+=box

// manger
if(snakeX==food.x && snakeY==food.y){

score++
document.getElementById("score").innerText=score

food = randomFood()

}else{
snake.pop()
}

let newHead={x:snakeX,y:snakeY}

// collision
if(
snakeX<0 || snakeX>=400 ||
snakeY<0 || snakeY>=400 ||
collision(newHead,snake)
){

if(score > best){
localStorage.setItem("bestScore", score)
}

clearInterval(game)

setTimeout(()=>{
alert("Game Over ! Score : "+score)
},100)

}

snake.unshift(newHead)

}

function collision(head,array){
for(let i=0;i<array.length;i++){
if(head.x==array[i].x && head.y==array[i].y){
return true
}
}
return false
}

let speed = 120

let game = setInterval(draw, speed)

function restartGame(){
location.reload()
}

</script>

</body>
</html>

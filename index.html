<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake PRO | Lucio</title>

<style>

body {
  margin: 0;
  background: radial-gradient(circle, #000, #050505);
  font-family: Arial, sans-serif;
  text-align: center;
  color: white;
}

h1 {
  color: orange;
  text-shadow: 0 0 10px orange;
}

canvas {
  background: #111;
  border: 3px solid orange;
  border-radius: 12px;
  box-shadow: 0 0 25px orange;
}

.ui {
  margin-top: 10px;
}

.controls {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.controls div {
  display: flex;
}

.controls button {
  width: 75px;
  height: 75px;
  margin: 8px;
  font-size: 24px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(145deg, orange, #ff6600);
  color: black;
}

#restart {
  display: none;
  margin-top: 15px;
  padding: 10px 20px;
  background: orange;
  border: none;
  border-radius: 10px;
}

</style>
</head>

<body>

<h1>🐍 Snake PRO</h1>

<div class="ui">
Score: <span id="score">0</span> |
Best: <span id="best">0</span>
</div>

<canvas id="game" width="300" height="300"></canvas>

<button id="restart" onclick="restartGame()">Recommencer</button>

<div class="controls">
  <div>
    <button onclick="changeDirection('up')">↑</button>
  </div>
  <div>
    <button onclick="changeDirection('left')">←</button>
    <button onclick="changeDirection('down')">↓</button>
    <button onclick="changeDirection('right')">→</button>
  </div>
</div>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let snake, direction, food, score, best, speed, gameOver

function init(){
  snake = [{x: 160, y: 160}]
  direction = "right"
  food = generateFood()
  score = 0
  speed = 120
  gameOver = false

  best = localStorage.getItem("bestSnake") || 0
  document.getElementById("best").innerText = best

  document.getElementById("restart").style.display = "none"
}

// Générer nourriture (évite le snake)
function generateFood(){
  let newFood
  do {
    newFood = {
      x: Math.floor(Math.random()*15)*20,
      y: Math.floor(Math.random()*15)*20
    }
  } while(snake && snake.some(s => s.x === newFood.x && s.y === newFood.y))
  
  return newFood
}

// Empêche demi-tour
function changeDirection(dir){
  if(dir === "up" && direction !== "down") direction = dir
  if(dir === "down" && direction !== "up") direction = dir
  if(dir === "left" && direction !== "right") direction = dir
  if(dir === "right" && direction !== "left") direction = dir
}

// clavier
document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowUp") changeDirection("up")
  if(e.key==="ArrowDown") changeDirection("down")
  if(e.key==="ArrowLeft") changeDirection("left")
  if(e.key==="ArrowRight") changeDirection("right")
})

function draw(){

  if(gameOver){
    ctx.fillStyle="white"
    ctx.font="20px Arial"
    ctx.fillText("GAME OVER",80,150)

    if(score > best){
      localStorage.setItem("bestSnake", score)
    }

    document.getElementById("restart").style.display = "block"
    return
  }

  // fond
  ctx.fillStyle="#111"
  ctx.fillRect(0,0,300,300)

  // snake glow
  ctx.shadowBlur = 15
  ctx.shadowColor = "orange"

  ctx.fillStyle="orange"
  snake.forEach(s => {
    ctx.fillRect(s.x, s.y, 20, 20)
  })

  ctx.shadowBlur = 0

  // food
  ctx.shadowBlur = 15
  ctx.shadowColor = "red"

  ctx.fillStyle="red"
  ctx.fillRect(food.x, food.y, 20, 20)

  ctx.shadowBlur = 0

  // mouvement
  let head = { ...snake[0] }

  if(direction==="up") head.y -= 20
  if(direction==="down") head.y += 20
  if(direction==="left") head.x -= 20
  if(direction==="right") head.x += 20

  snake.unshift(head)

  // collision mur
  if(head.x < 0 || head.y < 0 || head.x >= 300 || head.y >= 300){
    gameOver = true
  }

  // collision soi-même
  for(let i=1;i<snake.length;i++){
    if(head.x === snake[i].x && head.y === snake[i].y){
      gameOver = true
    }
  }

  // ✅ CORRECTION MANGER (PARFAITE)
  if(head.x === food.x && head.y === food.y){
    score++
    food = generateFood()

    // vitesse progressive douce
    if(score % 3 === 0){
      speed = Math.max(70, speed - 3)
    }

  } else {
    snake.pop()
  }

  document.getElementById("score").innerText = score

  setTimeout(draw, speed)
}

function restartGame(){
  init()
  draw()
}

init()
draw()

</script>

</body>
</html>
